<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Asistencia · REVEM</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --green: #6BBE2E; --dark: #2D3436; --gray: #636E72; --light: #F8F9FA; --border: #DFE6E9; }
body {
  font-family: "Montserrat", sans-serif;
  background: linear-gradient(135deg, #1a1a2e 0%, #2D3436 60%, #1a3a1a 100%);
  min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
}
.card { background: white; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); max-width: 500px; width: 100%; overflow: hidden; }
.card-header { background: var(--dark); padding: 20px 26px; display: flex; align-items: center; gap: 13px; }
.card-header img { height: 30px; object-fit: contain; }
.htext h1 { color: white; font-size: 15px; font-weight: 600; margin-bottom: 2px;}
.htext p { color: rgba(255,255,255,0.6); font-size: 11px; margin-top: 2px; }
.card-body { padding: 26px; }

.form-group { margin-bottom: 20px; }
.form-label { display: block; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--gray); margin-bottom: 8px; }
.form-control { 
  width: 100%; 
  padding: 12px 16px; 
  font-family: "Montserrat", sans-serif; 
  font-size: 14px; 
  color: var(--dark); 
  background: var(--light); 
  border: 1px solid var(--border); 
  border-radius: 8px; 
  outline: none; 
  transition: all 0.3s ease;
}
.form-control:focus {
  border-color: var(--green);
  box-shadow: 0 0 0 3px rgba(107, 190, 46, 0.2);
  background: white;
}
.form-control::placeholder { color: #adb5bd; font-family: "Montserrat", sans-serif; font-size: 13px; }

.btn-submit {
  width: 100%;
  padding: 14px;
  background: var(--green);
  color: white;
  border: none;
  border-radius: 8px;
  font-family: "Montserrat", sans-serif;
  font-size: 14px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.3s ease;
  margin-top: 10px;
}
.btn-submit:hover {
  background: #5aa127;
  transform: translateY(-2px);
  box-shadow: 0 10px 20px rgba(107, 190, 46, 0.3);
}
.btn-submit:active { transform: translateY(0); }

.card-footer { background: var(--light); padding: 15px 26px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 8px; justify-content: center; }
.footer-logo { height: 16px; opacity: 0.5; }
.footer-text { font-size: 10px; color: var(--gray); font-weight: 500;}
</style>
</head>

<script>
document.getElementById('registroForm').addEventListener('submit', function(e) {
  e.preventDefault(); // Evita que la página se recargue

  const btn = document.querySelector('.btn-submit');
  const originalText = btn.innerText;
  btn.innerText = 'Enviando...';
  btn.disabled = true;

  const formData = new FormData(this);
  
  // URL del Web App de Google Apps Script (La obtendremos en los siguientes pasos)
  const scriptURL = 'https://script.google.com/macros/s/AKfycbwE1MpZ31fQnp2zTCoR-09VNbuXojJwUygRBN_2Uze7w7d52MXd4Svq4pX2PrPuvjuG/exec';

  fetch(scriptURL, { method: 'POST', body: formData })
    .then(response => {
      document.querySelector('.card-body').innerHTML = `
        <div style="text-align:center; padding: 20px;">
          <div style="font-size:48px; color:var(--green); margin-bottom:15px;">&#10004;</div>
          <h2 style="color:var(--dark); font-size: 20px; margin-bottom: 8px;">¡Registro Exitoso!</h2>
          <p style="color:var(--gray); font-size: 13px; line-height: 1.5;">
            Tus datos han sido guardados correctamente.<br><br>
            <strong>Revisa tu correo electrónico</strong>, en un momento te llegará el enlace para acceder a tu certificado.
          </p>
        </div>`;
    })
    .catch(error => {
      alert('Hubo un error de conexión. Por favor, intenta enviar de nuevo.');
      btn.innerText = originalText;
      btn.disabled = false;
    });
});
</script>
